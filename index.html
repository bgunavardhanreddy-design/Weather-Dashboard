<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> Weather Dashboard</h1>
        
        <!-- Search Section -->
        <div class="search-section">
            <input type="text" id="cityInput" placeholder="Enter city name..." spellcheck="false">
            <button id="searchBtn">Search</button>
            <button id="currentLocationBtn"> Current Location</button>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="error-msg"></div>

        <!-- Current Weather Card -->
        <div id="currentWeather" class="weather-card" style="display: none;">
            <div class="city-name" id="cityName"></div>
            <div class="date" id="date"></div>
            <div class="temp" id="temperature"></div>
            <div class="condition" id="condition"></div>
            <div class="details">
                <div class="detail-item">
                    <span> Humidity</span>
                    <span id="humidity"></span>
                </div>
                <div class="detail-item">
                    <span> Wind Speed</span>
                    <span id="windSpeed"></span>
                </div>
                <div class="detail-item">
                    <span> Feels Like</span>
                    <span id="feelsLike"></span>
                </div>
            </div>
        </div>

        <!-- 5-Day Forecast -->
        <div id="forecast" class="forecast-section" style="display: none;">
            <h2>5-Day Forecast</h2>
            <div id="forecastGrid" class="forecast-grid"></div>
        </div>

        <!-- Recent Searches -->
        <div id="recentSearches" class="recent-section" style="display: none;">
            <h3> Recent Searches</h3>
            <div id="recentList" class="recent-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
